<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>預覽器設定</title>
    <style>
        body { width: 340px; padding: 15px; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 8px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .hint { font-size: 11px; color: #666; margin-top: 2px; }
        button { width: 100%; padding: 8px; background-color: #0055a4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #004080; }
        #status { text-align: center; font-size: 13px; color: #28a745; margin-top: 10px; min-height: 18px; }
    </style>
</head>
<body>
    <h3>擴充功能設定</h3>
    <div class="form-group"><label>圖片/Image</label><input type="text" id="images"></div>
    <div class="form-group"><label>影片/Video</label><input type="text" id="videos"></div>
    <div class="form-group"><label>音訊/Audio</label><input type="text" id="audios"></div>
    <div class="form-group"><label>程式碼/Code</label><input type="text" id="codes"></div>
    <div class="form-group"><label>純文字/Plain Text</label><input type="text" id="plaintext"></div>
    <div class="form-group"><label>壓縮檔/Archives (僅支援 zip, tgz, gz 結構預覽)</label><input type="text" id="archives"></div>
    <div class="form-group"><label>試算表/Excel (僅支援表格預覽)</label><input type="text" id="excels"></div>
    <div class="form-group"><label>簡報/PowerPoint (僅支援文字與圖片預覽)</label><input type="text" id="powerpoints">
    <div class="hint">請用半形逗號 (,) 分隔副檔名</div>
    </div>
    
    <button id="save">儲存設定</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
